<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#F5F0EB" />
    <meta name="description" content="2307 山海相逢，星辰作别" />
    <title>2307</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <div id="initial-loader" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f5f0eb;color:#0c0816;font-family:'Noto Sans SC','PingFang SC',sans-serif;transition:opacity .6s ease,visibility .6s ease">
        <style>
          @keyframes dot-pulse{0%,80%,100%{transform:scale(.4);opacity:.3}40%{transform:scale(1);opacity:1}}
          @keyframes fade-text{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
          .loader-dots{display:flex;gap:8px;margin-bottom:24px}
          .loader-dots span{width:6px;height:6px;border-radius:50%;background:#0c0816;animation:dot-pulse 1.4s ease-in-out infinite}
          .loader-dots span:nth-child(2){animation-delay:.16s}
          .loader-dots span:nth-child(3){animation-delay:.32s}
          .loader-text{font-size:13px;letter-spacing:2px;color:#6b7280;animation:fade-text .8s ease forwards}
        </style>
        <div class="loader-dots"><span></span><span></span><span></span></div>
        <p class="loader-text">正在准备回忆</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
